<!DOCTYPE html>
<html lang="zh-CN" data-theme="system">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0b0e14" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="黑体辐射" />
  <meta name="description" content="黑体辐射定律交互式可视化（普朗克定律 / 维恩位移定律），移动端 PWA。" />

  <title>黑体辐射可视化</title>

  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" type="image/png" sizes="192x192" href="assets/icon-192.png" />
  <link rel="apple-touch-icon" href="assets/icon-512.png" />

  <link rel="stylesheet" href="css/style.css" />
  <script src="https://cdn.plot.ly/plotly-2.32.0.min.js" charset="utf-8"></script>
</head>
<body>
  <!-- 顶栏 -->
  <header class="topbar">
    <div class="brand">
      <span class="brand-glow" aria-hidden="true"></span>
      <div class="brand-text">
        <h1>黑体辐射</h1>
        <p>Black Body Radiation</p>
      </div>
    </div>
    <div class="topbar-actions">
      <button id="install-btn" class="icon-btn hidden" title="安装到手机" aria-label="安装到手机">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v12"/><path d="m7 10 5 5 5-5"/><path d="M5 21h14"/></svg>
      </button>
      <button id="theme-btn" class="icon-btn" title="切换主题" aria-label="切换主题">
        <svg class="ico-sun" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>
        <svg class="ico-moon hidden" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.8A9 9 0 1 1 11.2 3 7 7 0 0 0 21 12.8z"/></svg>
        <svg class="ico-auto hidden" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 3a9 9 0 0 0 0 18z"/></svg>
      </button>
    </div>
  </header>

  <!-- 视图切换标签 -->
  <nav class="view-tabs" role="tablist" aria-label="视图切换">
    <button class="view-tab active" data-view="surface" role="tab">3D 曲面</button>
    <button class="view-tab" data-view="curves" role="tab">多温度曲线</button>
  </nav>

  <main class="main-wrap">
    <!-- 参数面板（桌面侧栏 / 移动端底部抽屉） -->
    <aside id="panel" class="panel">
      <div class="drawer-handle" id="drawer-handle" aria-hidden="true"></div>
      <div class="panel-inner">
        <div class="panel-head">
          <h2>参数</h2>
          <button class="text-btn" id="panel-close" aria-label="关闭面板">收起</button>
        </div>

        <section class="panel-section">
          <h3>预设场景</h3>
          <div class="preset-grid" id="preset-grid"></div>
        </section>

        <section class="panel-section">
          <h3>温度 <span id="preset-badge" class="preset-badge hidden">预设模式</span></h3>
          <div id="preset-exit-wrap" class="hidden">
            <button id="preset-exit" class="ghost-btn small">✕ 退出预设（自定义温度）</button>
          </div>
          <div class="field temp-field">
            <label for="tmin">最低温度 T<sub>min</sub></label>
            <div class="slider-row">
              <input type="range" id="tmin" min="300" max="9000" step="50" value="500" />
              <output id="tmin-out">500 K</output>
            </div>
          </div>
          <div class="field temp-field">
            <label for="tmax">最高温度 T<sub>max</sub></label>
            <div class="slider-row">
              <input type="range" id="tmax" min="300" max="9000" step="50" value="6000" />
              <output id="tmax-out">6000 K</output>
            </div>
          </div>
          <div class="field temp-field">
            <label for="tsteps">温度步数</label>
            <div class="slider-row">
              <input type="range" id="tsteps" min="1" max="40" step="1" value="12" />
              <output id="tsteps-out">12</output>
            </div>
          </div>
        </section>

        <section class="panel-section">
          <h3>波长范围</h3>
          <div class="field">
            <label for="lmin">最短波长 λ<sub>min</sub></label>
            <div class="slider-row">
              <input type="range" id="lmin" min="50" max="5000" step="10" value="100" />
              <output id="lmin-out">100 nm</output>
            </div>
          </div>
          <div class="field">
            <label for="lmax">最长波长 λ<sub>max</sub></label>
            <div class="slider-row">
              <input type="range" id="lmax" min="100" max="10000" step="10" value="3000" />
              <output id="lmax-out">3000 nm</output>
            </div>
          </div>
          <div class="field">
            <label for="lsteps">波长步数</label>
            <div class="slider-row">
              <input type="range" id="lsteps" min="20" max="300" step="5" value="100" />
              <output id="lsteps-out">100</output>
            </div>
          </div>
        </section>

        <section class="panel-section">
          <h3>显示选项</h3>
          <div class="field">
            <label>纵轴模式</label>
            <div class="seg" id="ymode">
              <button class="seg-btn active" data-val="linear">线性</button>
              <button class="seg-btn" data-val="log">对数</button>
            </div>
          </div>
          <div class="field">
            <label>色彩方案</label>
            <div class="cs-grid" id="cs-grid">
              <!-- 配色按钮由 JS 生成 -->
            </div>
          </div>
        </section>

        <button id="btn-update" class="primary-btn">↻ 更新图表</button>
        <button id="btn-export" class="ghost-btn">⤓ 导出当前图表 PNG</button>

        <section class="panel-section theory">
          <h3>维恩位移定律</h3>
          <p class="formula">λ<sub>peak</sub> = b / T，b = 2.898×10⁻³ m·K</p>
          <p class="peak-line">T<sub>min</sub> 峰值：<b id="peak-min">—</b></p>
          <p class="peak-line">T<sub>max</sub> 峰值：<b id="peak-max">—</b></p>

          <h3>普朗克辐射定律</h3>
          <p class="formula">B(λ,T) = (2hc²/λ⁵) · 1/(e<sup>hc/λkT</sup> − 1)</p>
          <p class="const">h = 6.626×10⁻³⁴ J·s &nbsp; c = 2.998×10⁸ m/s &nbsp; k = 1.381×10⁻²³ J/K</p>
        </section>
      </div>
    </aside>

    <!-- 图表区 -->
    <section class="chart-area">
      <button class="fab" id="open-panel" aria-label="打开参数面板">
        <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="4" y1="21" x2="4" y2="14"/><line x1="4" y1="10" x2="4" y2="3"/><line x1="12" y1="21" x2="12" y2="12"/><line x1="12" y1="8" x2="12" y2="3"/><line x1="20" y1="21" x2="20" y2="16"/><line x1="20" y1="12" x2="20" y2="3"/><line x1="1" y1="14" x2="7" y2="14"/><line x1="9" y1="8" x2="15" y2="8"/><line x1="17" y1="16" x2="23" y2="16"/></svg>
      </button>
      <div id="plot"></div>
      <div class="status" id="status">就绪</div>
    </section>

    <div class="overlay" id="overlay"></div>
  </main>

  <script src="js/app.js"></script>
</body>
</html>
